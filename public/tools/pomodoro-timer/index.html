<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Beautiful focus timer for deep work">
  <meta property="og:title" content="Pomodoro Timer">
  <meta property="og:description" content="Beautiful focus timer for deep work">
  <title>Pomodoro Timer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2210%22 y=%2280%22 font-size=%2280%22>🕒</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3498db',
            secondary: '#2ecc71',
            accent: '#e74c3c',
            neutral: '#95a5a6'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    .progress-ring {
      @apply relative;
      @apply w-40 h-40;
      @apply border-4 border-gray-100;
      @apply rounded-full;
    }
    .progress-ring:after {
      @apply absolute;
      @apply top-1/2 left-1/2;
      @apply -translate-x-1/2 -translate-y-1/2;
      @apply w-32 h-32;
      @apply border-4 border-transparent;
      @apply border-t-primary;
      @apply rounded-full;
      @apply animate-spin;
      content: '';
    }
    .dark .progress-ring:after {
      @apply border-t-primary;
    }
    .light .progress-ring:after {
      @apply border-t-secondary;
    }
  </style>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <main class="max-w-lg p-8 rounded-2xl bg-gray-900 backdrop-filter backdrop-blur-lg shadow-lg">
    <header class="mb-8">
      <h1 class="text-3xl font-bold mb-2">Pomodoro Timer</h1>
      <p class="text-gray-400">Beautiful focus timer for deep work</p>
    </header>
    <section class="mb-8">
      <div class="progress-ring" id="progress-ring">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl font-bold" id="timer-display">25:00</div>
      </div>
    </section>
    <section class="mb-8">
      <button class="px-4 py-2 bg-primary text-gray-100 rounded-lg hover:bg-accent active:scale-90" id="start-button">Start</button>
      <button class="px-4 py-2 bg-secondary text-gray-100 rounded-lg hover:bg-accent active:scale-90" id="pause-button" disabled>Pause</button>
      <button class="px-4 py-2 bg-accent text-gray-100 rounded-lg hover:bg-primary active:scale-90" id="reset-button">Reset</button>
    </section>
    <section class="mb-8">
      <label class="block text-gray-400 mb-2">Work duration (minutes):</label>
      <input type="number" id="work-duration" value="25" class="px-4 py-2 bg-gray-800 text-gray-100 rounded-lg focus:ring-primary">
      <label class="block text-gray-400 mb-2 mt-4">Break duration (minutes):</label>
      <input type="number" id="break-duration" value="5" class="px-4 py-2 bg-gray-800 text-gray-100 rounded-lg focus:ring-primary">
      <label class="block text-gray-400 mb-2 mt-4">Long break duration (minutes):</label>
      <input type="number" id="long-break-duration" value="15" class="px-4 py-2 bg-gray-800 text-gray-100 rounded-lg focus:ring-primary">
    </section>
    <section class="mb-8">
      <p class="text-gray-400 mb-2">Session counter: <span id="session-counter">0</span></p>
      <button class="px-4 py-2 bg-secondary text-gray-100 rounded-lg hover:bg-accent active:scale-90" id="toggle-dark-mode-button">Toggle light mode</button>
    </section>
  </main>
  <script>
    const progressRing = document.getElementById('progress-ring');
    const timerDisplay = document.getElementById('timer-display');
    const startButton = document.getElementById('start-button');
    const pauseButton = document.getElementById('pause-button');
    const resetButton = document.getElementById('reset-button');
    const workDurationInput = document.getElementById('work-duration');
    const breakDurationInput = document.getElementById('break-duration');
    const longBreakDurationInput = document.getElementById('long-break-duration');
    const sessionCounterDisplay = document.getElementById('session-counter');
    const toggleDarkModeButton = document.getElementById('toggle-dark-mode-button');
    let workDuration = 25 * 60;
    let breakDuration = 5 * 60;
    let longBreakDuration = 15 * 60;
    let timer = null;
    let isRunning = false;
    let isBreak = false;
    let sessionCounter = 0;
    let currentTime = workDuration;
    let audio = new Audio('https://raw.githubusercontent.com/foundersystems/pomodoro-timer/main/audio/ding.mp3');
    startButton.addEventListener('click', startTimer);
    pauseButton.addEventListener('click', pauseTimer);
    resetButton.addEventListener('click', resetTimer);
    workDurationInput.addEventListener('input', updateWorkDuration);
    breakDurationInput.addEventListener('input', updateBreakDuration);
    longBreakDurationInput.addEventListener('input', updateLongBreakDuration);
    toggleDarkModeButton.addEventListener('click', toggleDarkMode);
    document.addEventListener('keydown', handleKeyboardInput);
    function startTimer() {
      isRunning = true;
      startButton.disabled = true;
      pauseButton.disabled = false;
      timer = setInterval(updateTimer, 1000);
    }
    function pauseTimer() {
      isRunning = false;
      startButton.disabled = false;
      pauseButton.disabled = true;
      clearInterval(timer);
    }
    function resetTimer() {
      isRunning = false;
      startButton.disabled = false;
      pauseButton.disabled = true;
      clearInterval(timer);
      currentTime = workDuration;
      timerDisplay.textContent = formatTime(currentTime);
      progressRing.classList.remove('animate-pause');
    }
    function updateTimer() {
      if (currentTime > 0) {
        currentTime--;
        timerDisplay.textContent = formatTime(currentTime);
        const progress = (workDuration - currentTime) / workDuration;
        progressRing.style.setProperty('--progress', progress);
      } else {
        if (isBreak) {
          audio.play();
          sessionCounter++;
          sessionCounterDisplay.textContent = sessionCounter;
          isBreak = false;
          currentTime = workDuration;
        } else {
          audio.play();
          isBreak = true;
          currentTime = breakDuration;
        }
        timerDisplay.textContent = formatTime(currentTime);
      }
    }
    function updateWorkDuration() {
      workDuration = parseInt(workDurationInput.value) * 60;
    }
    function updateBreakDuration() {
      breakDuration = parseInt(breakDurationInput.value) * 60;
    }
    function updateLongBreakDuration() {
      longBreakDuration = parseInt(longBreakDurationInput.value) * 60;
    }
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
    }
    function handleKeyboardInput(event) {
      if (event.key === ' ') {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
        }
      } else if (event.key === 'r') {
        resetTimer();
      }
    }
    function formatTime(time) {
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }
  </script>
  <footer class="fixed bottom-0 left-0 p-4 text-gray-400">
    Built by Founder Systems 2024
  </footer>
</body>
</html>
