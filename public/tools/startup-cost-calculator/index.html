<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Startup Cost Calculator</title><link href="https://cdn.tailwindcss.com" rel="stylesheet"><style>body { background-color: #2f2f2f; color: #fff; }</style></head><body class="flex justify-center items-center h-screen"><div class="bg-gray-800 p-8 rounded-lg"><h1 class="text-3xl font-bold mb-4">Startup Cost Calculator</h1><form><div class="mb-4"><label for="team-size" class="block text-sm font-medium text-gray-300">Team Size:</label><select id="team-size" class="block w-full p-2 pl-10 text-sm text-gray-300 border-gray-500 rounded-lg focus:outline-none focus:ring-gray-500 focus:border-gray-500"><option value="1-5">1-5</option><option value="6-10">6-10</option><option value="11-20">11-20</option><option value="21+">21+</option></select></div><div class="mb-4"><label for="office" class="block text-sm font-medium text-gray-300">Office/Remote:</label><select id="office" class="block w-full p-2 pl-10 text-sm text-gray-300 border-gray-500 rounded-lg focus:outline-none focus:ring-gray-500 focus:border-gray-500"><option value="office">Office</option><option value="remote">Remote</option></select></div><div class="mb-4"><label for="city" class="block text-sm font-medium text-gray-300">City:</label><select id="city" class="block w-full p-2 pl-10 text-sm text-gray-300 border-gray-500 rounded-lg focus:outline-none focus:ring-gray-500 focus:border-gray-500"><option value="sf">San Francisco</option><option value="nyc">New York City</option><option value="la">Los Angeles</option></select></div><div class="mb-4"><label for="funding-stage" class="block text-sm font-medium text-gray-300">Funding Stage:</label><select id="funding-stage" class="block w-full p-2 pl-10 text-sm text-gray-300 border-gray-500 rounded-lg focus:outline-none focus:ring-gray-500 focus:border-gray-500"><option value="seed">Seed</option><option value="series-a">Series A</option><option value="series-b">Series B</option></select></div><button class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg" onclick="calculateBurnRate()">Calculate Burn Rate</button></form><p id="burn-rate" class="text-lg font-bold mt-4"></p><script>function calculateBurnRate() { const teamSize = document.getElementById("team-size").value; const office = document.getElementById("office").value; const city = document.getElementById("city").value; const fundingStage = document.getElementById("funding-stage").value; let burnRate; switch (teamSize) { case "1-5": burnRate = 10000; break; case "6-10": burnRate = 20000; break; case "11-20": burnRate = 30000; break; case "21+": burnRate = 40000; break; } if (office === "office") { burnRate *= 1.5; } if (city === "sf") { burnRate *= 1.2; } else if (city === "nyc") { burnRate *= 1.1; } if (fundingStage === "series-a") { burnRate *= 1.5; } else if (fundingStage === "series-b") { burnRate *= 2; } document.getElementById("burn-rate").innerText = `Estimated monthly burn rate: $${burnRate}`; }</script></div></body></html>
