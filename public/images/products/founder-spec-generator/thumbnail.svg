    <text x="164" y="474" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="800">MVP scope</text>
    <rect x="310" y="436" width="150" height="60" rx="24" fill="#FFF5EC" stroke="#1B1C1A" stroke-width="2"/>
    <text x="339" y="474" fill="#1B1C1A" font-family="Arial, sans-serif" font-size="26" font-weight="700">Pricing</text>

    <rect x="130" y="522" width="132" height="56" rx="22" fill="#101828" fill-opacity="0.08"/>
    <text x="163" y="557" fill="#1B1C1A" font-family="Arial, sans-serif" font-size="24" font-weight="700">ICP</text>
