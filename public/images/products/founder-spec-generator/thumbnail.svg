    <text x="720" y="646" fill="#1B1C1A" font-family="Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="2">WHAT YOU LEAVE WITH</text>
    <text x="720" y="690" fill="#1B1C1A" fill-opacity="0.72" font-family="Arial, sans-serif" font-size="28" font-weight="700">A sharper founder spec and</text>
