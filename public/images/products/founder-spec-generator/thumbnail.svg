  <circle cx="920" cy="730" r="96" fill="#101828" fill-opacity="0.08"/>
  <rect x="72" y="76" width="214" height="58" rx="29" fill="white" fill-opacity="0.94" stroke="#1B1C1A" stroke-width="3"/>
