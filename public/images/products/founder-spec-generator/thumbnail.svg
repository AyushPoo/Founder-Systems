    <text x="320" y="557" fill="#1B1C1A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Go-to-market</text>

    <rect x="130" y="618" width="328" height="10" rx="5" fill="#101828" fill-opacity="0.10"/>
    <rect x="130" y="650" width="242" height="10" rx="5" fill="#101828" fill-opacity="0.10"/>
  </g>

  <g transform="translate(540 160)">
    <rect x="64" y="94" width="542" height="520" rx="42" fill="white" fill-opacity="0.64"/>
    <image href="../../hero.png" x="40" y="0" width="620" height="620" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#shadow)">
