name: Sync Products on Push

on:
  push:
    branches: [main]
    paths:
      - 'public/products/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger n8n Product Publisher
        run: |
          curl -s -X POST \\
            -H "Content-Type: application/json" \\
            -d '{"ref": "${{ github.sha }}", "pusher": "${{ github.actor }}"}' \\
            "${{ secrets.N8N_PRODUCT_WEBHOOK_URL }}"
        
      - name: Notify Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \\
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \\
            -d "text=🚀 Product sync triggered by ${{ github.actor }} on push to main"
